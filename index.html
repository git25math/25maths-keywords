<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25Maths Keywords</title>

  <!-- Fonts & External SDKs -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Particle Canvas -->
<canvas id="fx"></canvas>

<!-- Auth Overlay -->
<div class="ov vis" id="ov-auth">
  <div class="auth-card">
    <div class="auth-logo">25</div>
    <div class="auth-title">25Maths Keywords</div>
    <div class="auth-sub">IGCSE 数学词汇学习平台</div>
    <input class="auth-input" id="auth-email" type="email" placeholder="邮箱地址">
    <input class="auth-input" id="auth-pass" type="password" placeholder="密码 (至少6位)">
    <div class="auth-err" id="auth-err"></div>
    <button class="btn btn-primary btn-block" id="auth-login">登录 / 注册</button>
    <button class="btn btn-ghost btn-block" id="auth-skip">先不登录，直接体验</button>
    <div class="auth-note">首次输入邮箱将自动注册 · 登录后可跨设备同步进度</div>
  </div>
</div>

<!-- Board Selection Overlay -->
<div class="ov" id="ov-board">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">25</div>
    <div class="auth-title" id="board-sel-title">选择你的课程</div>
    <div class="auth-sub" id="board-sel-sub">选课后只显示对应模块的词汇，可在设置中更换</div>
    <div id="board-sel-list"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app-shell" class="shell" style="display:none">

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">25</div>
      <div>
        <div class="brand-name">25Maths</div>
        <div class="brand-sub">Keywords</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-panel="home" onclick="navTo('home')">
        <span class="nav-icon">🏠</span><span class="nav-label" data-en="Home" data-zh="首页">首页</span>
      </button>
      <button class="nav-item" data-panel="review-dash" onclick="navTo('review-dash')">
        <span class="nav-icon">🧠</span><span class="nav-label" data-en="Review" data-zh="复习">复习</span>
        <span class="nav-badge" id="nav-rv-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-panel="import" onclick="navTo('import')">
        <span class="nav-icon">📥</span><span class="nav-label" data-en="Import" data-zh="导入">导入</span>
      </button>
      <button class="nav-item" data-panel="board" onclick="navTo('board')">
        <span class="nav-icon">🏆</span><span class="nav-label" data-en="Leaderboard" data-zh="排行榜">排行榜</span>
      </button>
    </nav>

    <div class="sidebar-decks" id="sidebar-decks"></div>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <span class="sidebar-user-rank" id="sb-rank"></span>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sb-name"></div>
          <div class="sidebar-user-meta" id="sb-meta"></div>
          <div class="sidebar-user-board" id="sb-board"></div>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn-icon" id="lang-toggle-sb" onclick="toggleLang()" title="语言切换">EN</button>
        <button class="btn-icon" onclick="showSettings()" title="设置">⚙</button>
        <button class="btn-icon" id="btn-logout-sb" title="退出">↩</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="content">
    <!-- Mobile/Tablet Header -->
    <header class="header-bar" id="header-bar">
      <div class="header-left">
        <div class="header-brand">25Maths</div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="lang-toggle-hb" onclick="toggleLang()">EN</button>
        <div class="header-user">
          <span id="hb-rank"></span>
          <span id="hb-name"></span>
        </div>
        <button class="btn-icon" onclick="showSettings()" title="设置">⚙</button>
        <button class="btn-icon" id="btn-logout-hb" title="退出">↩</button>
      </div>
    </header>

    <!-- Panels -->
    <div class="main-pad">
      <div class="panel active" id="panel-home"></div>
      <div class="panel" id="panel-deck"></div>
      <div class="panel" id="panel-study"></div>
      <div class="panel" id="panel-battle"></div>
      <div class="panel" id="panel-review-dash"></div>
      <div class="panel" id="panel-review"></div>
      <div class="panel" id="panel-import"></div>
      <div class="panel" id="panel-board"></div>
      <div class="panel" id="panel-quiz"></div>
      <div class="panel" id="panel-spell"></div>
      <div class="panel" id="panel-match"></div>
      <div class="panel" id="panel-preview"></div>
    </div>
  </div>

  <!-- Mobile/Tablet Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bnav-item active" data-panel="home" onclick="navTo('home')">
      <span class="bnav-icon">🏠</span><span class="bnav-label" data-en="Home" data-zh="首页">首页</span>
    </button>
    <button class="bnav-item" data-panel="review-dash" onclick="navTo('review-dash')">
      <span class="bnav-icon">🧠</span><span class="bnav-label" data-en="Review" data-zh="复习">复习</span>
    </button>
    <button class="bnav-item" data-panel="import" onclick="navTo('import')">
      <span class="bnav-icon">📥</span><span class="bnav-label" data-en="Import" data-zh="导入">导入</span>
    </button>
    <button class="bnav-item" data-panel="board" onclick="navTo('board')">
      <span class="bnav-icon">🏆</span><span class="bnav-label" data-en="Board" data-zh="排行">排行</span>
    </button>
  </nav>

</div><!-- /app-shell -->

<!-- Toast -->
<div id="toast-el" class="toast"></div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-card" id="modal-card"></div>
</div>

<!-- Combo Popup -->
<div class="combo-pop" id="combo-el"></div>

<!-- Scripts (load order matters) -->
<script src="js/config.js"></script>
<script src="js/levels.js"></script>
<script src="js/storage.js"></script>
<script src="js/particles.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/mastery.js"></script>
<script src="js/study.js"></script>
<script src="js/battle.js"></script>
<script src="js/review.js"></script>
<script src="js/quiz.js"></script>
<script src="js/spell.js"></script>
<script src="js/match.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
