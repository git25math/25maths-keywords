<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>25Maths Keywords</title>

  <!-- Fonts & External SDKs -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){try{if(localStorage.getItem('wmatch_dark')==='1'||(localStorage.getItem('wmatch_dark')===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark')}}catch(e){}})()</script>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="fx"></canvas>

<!-- Auth Overlay -->
<div class="ov vis" id="ov-auth">

    <input class="auth-input" id="auth-email" type="email" placeholder="Email">
    <input class="auth-input" id="auth-pass" type="password" placeholder="Password (min 6 chars)">
    <div class="auth-err" id="auth-err"></div>
    <button class="btn btn-primary btn-block" id="auth-login" data-en="Login / Register" data-zh="зҷ»еҪ• / жіЁеҶҢ">Login / Register</button>
    <button class="btn btn-ghost btn-block" id="auth-skip" data-en="Try without login" data-zh="е…ҲдёҚзҷ»еҪ•пјҢзӣҙжҺҘдҪ“йӘҢ">Try without login</button>
    <div class="text-center"><a class="auth-forgot" onclick="showPasswordReset()" data-en="Forgot password?" data-zh="еҝҳи®°еҜҶз Ғпјҹ">Forgot password?</a></div>
    <div class="auth-note" data-en="First email auto-registers В· Login to sync across devices" data-zh="йҰ–ж¬Ўиҫ“е…ҘйӮ®з®ұе°ҶиҮӘеҠЁжіЁеҶҢ В· зҷ»еҪ•еҗҺеҸҜи·Ёи®ҫеӨҮеҗҢжӯҘиҝӣеәҰ">First email auto-registers В· Login to sync across devices</div>
    <div class="auth-divider"><span>OR</span></div>
    <button class="btn btn-ghost btn-block btn-sm" id="auth-teacher-toggle" onclick="toggleTeacherReg()"><span data-en="рҹ‘©вҖҚрҹҸ« Teacher Registration" data-zh="рҹ‘©вҖҚрҹҸ« ж•ҷеёҲжіЁеҶҢ">рҹ‘©вҖҚрҹҸ« Teacher Registration</span></button>
    <div id="teacher-reg" style="display:none">
      <input class="auth-input" id="tr-name" type="text" placeholder="Name">
      <input class="auth-input" id="tr-email" type="email" placeholder="Email">
      <input class="auth-input" id="tr-pass" type="password" placeholder="Password (min 6)">
      <input class="auth-input" id="tr-code" type="text" placeholder="School Code">
      <div class="auth-err" id="tr-err"></div>
      <button class="btn btn-primary btn-block" id="tr-submit" onclick="doTeacherRegister()" data-en="Register Teacher Account" data-zh="жіЁеҶҢж•ҷеёҲиҙҰеҸ·">Register Teacher Account</button>
    </div>
  </div>
</div>

<!-- Board Selection Overlay -->
<div class="ov" id="ov-board">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">25</div>
    <div class="auth-title" id="board-sel-title">йҖүжӢ©дҪ зҡ„иҜҫзЁӢ</div>
    <div class="auth-sub" id="board-sel-sub">йҖүиҜҫеҗҺеҸӘжҳҫзӨәеҜ№еә”жЁЎеқ—зҡ„иҜҚжұҮпјҢеҸҜеңЁи®ҫзҪ®дёӯжӣҙжҚў</div>
    <div id="board-sel-list"></div>
  </div>
</div>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">25</div>
      <div>
        <div class="brand-name">25Maths</div>
        <div class="brand-sub">Keywords</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-panel="home" onclick="navTo('home')">
        <span class="nav-icon">рҹҸ </span><span class="nav-label" data-en="Home" data-zh="йҰ–йЎө">йҰ–йЎө</span>
      </button>
      <button class="nav-item" data-panel="review-dash" onclick="navTo('review-dash')">
        <span class="nav-icon">рҹ§ </span><span class="nav-label" data-en="Review" data-zh="еӨҚд№ ">еӨҚд№ </span>
        <span class="nav-badge" id="nav-rv-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-panel="import" onclick="navTo('import')">
        <span class="nav-icon">рҹ“Ҙ</span><span class="nav-label" data-en="Import" data-zh="еҜје…Ҙ">еҜје…Ҙ</span>
      </button>
      <button class="nav-item" data-panel="board" onclick="navTo('board')">
        <span class="nav-icon">рҹҸҶ</span><span class="nav-label" data-en="Leaderboard" data-zh="жҺ’иЎҢжҰң">жҺ’иЎҢжҰң</span>
      </button>
      <button class="nav-item" data-panel="stats" onclick="navTo('stats')">
        <span class="nav-icon">рҹ“Ҡ</span><span class="nav-label" data-en="Stats" data-zh="з»ҹи®Ў">з»ҹи®Ў</span>
      </button>

        <button class="sf-menu-item" onclick="showSettings(); toggleUserMenu()">

        </button>

        </button>
        <button class="sf-menu-item" id="sound-toggle-sb" onclick="toggleSound()">
          <span class="sf-icon">рҹ”Ҡ</span><span data-en="Sound" data-zh="йҹіж•Ҳ">йҹіж•Ҳ</span>
        </button>
        <button class="sf-menu-item" id="lang-toggle-sb" onclick="toggleLang()">

        </button>
        <div class="sf-divider"></div>
        <div class="sf-menu-sync" id="sb-sync-status"></div>
        <div class="sf-divider"></div>
        <button class="sf-menu-item sf-danger" id="btn-logout-sb">
          <span class="sf-icon">вҶ©</span><span data-en="Log out" data-zh="йҖҖеҮәзҷ»еҪ•">йҖҖеҮәзҷ»еҪ•</span>
        </button>
      </div>
    </div>

    <!-- Mobile/Tablet Header -->
    <header class="header-bar" id="header-bar">
      <div class="header-left">
        <div class="header-brand">25Maths</div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="dark-toggle-hb" onclick="toggleDark()">рҹҢҷ</button>
        <button class="btn-icon" id="sound-toggle-hb" onclick="toggleSound()">рҹ”Ҡ</button>
        <button class="btn-icon" id="lang-toggle-hb" onclick="toggleLang()">дёӯж–Ү</button>

          <span id="hb-rank"></span>
          <span id="hb-name"></span>
        </div>
        <button class="btn-icon notif-bell" id="notif-bell-hb" style="display:none" onclick="showNotifPanel()" title="йҖҡзҹҘ">рҹ””<span class="notif-badge" id="notif-badge-hb">0</span></button>
        <button class="btn-icon" onclick="showSettings()" title="и®ҫзҪ®">вҡҷ</button>

      <div class="panel" id="panel-daily"></div>
      <div class="panel" id="panel-stats"></div>
      <div class="panel" id="panel-admin"></div>
      <div class="panel" id="panel-homework"></div>
